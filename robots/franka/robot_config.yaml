# Franka Panda Robot Config
# Used by: bridge /robot/config endpoint, MonitorPanel, replay, inference

robot_type: franka
dof_count: 9                                      # 7 arm joints + 2 finger joints
active_arm: single
active_arm_indices: [0, 1, 2, 3, 4, 5, 6]        # all 7 arm DOFs (single arm, no interleaving)
active_finger_indices: [7, 8]                      # panda_finger_joint1, panda_finger_joint2
data_to_sim: [0, 1, 2, 3, 4, 5, 6]               # 1:1 mapping, no reorder needed
negate_joints: []                                  # no negation needed
action_dim: 8                                      # 7 joints + 1 finger

# Homing pose (9-DOF): Franka default ready position
homing_pose: [0.0, -0.7854, 0.0, -2.3562, 0.0, 1.5708, 0.7854, 0.04, 0.04]

# Cameras for monitoring
cameras:
  cam_high:
    mount_link: world                              # fixed camera above workspace
    prim_name: cam_high
    translate: [0.5, 0.0, 1.2]                    # above and slightly forward
    orient_euler_xyz_deg: [180, -60, 0]            # looking down at table
    resolution: [512, 512]
    focal_length: 24.0
    clipping_range: [0.01, 5.0]
  cam_wrist:
    mount_link: panda_hand                         # mounted on end-effector
    prim_name: cam_wrist
    translate: [0.04, 0.0, 0.06]                  # in front of gripper
    orient_euler_xyz_deg: [180, 15, -90]           # looking forward from gripper
    resolution: [512, 512]
    focal_length: 24.0
    clipping_range: [0.01, 2.0]
